# Devise'ning o'zi ichki foydalanadigan xabarlar (flash, validatsiya xatolari)
# uchun o'zbekcha tarjima. Bu fayl config/locales/devise.en.yml va
# devise.ru.yml bilan bir xil tuzilishда — ILGARI BU FAYL UMUMAN YO'Q EDI,
# shuning uchun sayt standart tili (uz) bo'lgani sababli Devise xabarlari
# "Translation missing: uz...." ko'rinishida chiqib, foydalanuvchini
# chalg'itardi (masalan parol tiklash formasidagi xato ko'rsatilganда).
#
# E'tibor: bu app/views/devise'даgi forma matnlari
# (config/locales/views/devise.uz.yml) bilan ALMASHTIRMAYDI — u fayl
# saqlanadi, bu fayl Devise'ning O'ZI generatsiya qiladigan (controller
# ichida) xabarlar uchun.
