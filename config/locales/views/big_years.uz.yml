  big_years:
    index:
      title: Katta yil
    prises:
      title: Катта йил 2020
      text_1: >-
        Бу йил сайтимизда танловлар майдон учун зарур бўлган совғалар билан
        ўтиши ҳақида мамнуният билан хабар берамиз.
      text_2: Катта йил ғолиби чодирга эга бўлади.
      text_3: 'Иккинчи ўрин учун: ухлаш қопи.'
      text_4: 'Учинчи ўрин учун: туристик гиламча (каремат).'
      text_5: Йил дебюти учун мукофот — “Birds of Central Asia” қўлланмаси
      text_6: Йилнинг энг қизиқарли учратиш учун мукофот — дала идишлари тўплами.
      text_7: >-
        <a href="https://cadi.uni-greifswald.de/ru/start-2/">Марказий Осиё чўллари бўйича ташаббусдан</a>
        алоҳида номинация — «Чўлқушларининг энг яхши фотосурати».
      text_8: >-
        Бироқ бу ҳаммаси эмас! Сизни янада қизиқарли танловлар ва фойдали
        совғалар кутмоқда! Эълонларни кузатиб боринг ва ўз Катта йилингизни
        бошланг!
      good_luck: Омадли фотосурат овини тилаймиз!
      rules: 'Танлов қоидалари билан бу ерда танишишингиз мумкин:'
      big_year: «Катта йил» танлови
