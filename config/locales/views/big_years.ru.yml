ru:
  big_years:
    index:
      title: Большой Год
      rules:
        intro: >-
          «uzflora Большой год» — конкурс, направленный на изучение флоры
          Узбекистана, сбор актуальных данных о распространении видов
          растений, а также объединение натуралистов вокруг единой научной
          платформы. Во время конкурса участники размещают на платформе
          uzflora.uz фотографии дикорастущих растений, место наблюдения и
          другие необходимые данные.
        toc:
          title: Содержание
          items:
            - Цель конкурса
            - Сроки проведения конкурса
            - Участие в конкурсе
            - Требования к наблюдениям
            - Наблюдения, учитываемые в конкурсе
            - Критерии оценки
            - Система начисления баллов
            - Бережное отношение к природе
            - Запрещённые действия
            - Подтверждение результатов
            - Награждение победителей
            - Авторские права
            - Заключительные положения
        section_1:
          title: Цель конкурса
          intro: "Основные цели конкурса:"
          items:
            - сбор новых данных о распространении видов растений на территории Узбекистана;
            - стимулирование флористических наблюдений в малоизученных регионах;
            - расширение знаний о редких, эндемичных и нуждающихся в охране растениях;
            - формирование базы качественных фотоматериалов;
            - развитие сотрудничества между натуралистами-любителями, студентами и специалистами.
        section_2:
          title: Сроки проведения конкурса
          text: >-
            Конкурс продлится с 01.01.2026 по 31.12.2026. Учитываются только
            данные, полученные в природе и размещённые на платформе
            uzflora.uz в течение срока проведения конкурса.
        section_3:
          title: Участие в конкурсе
          text_1: >-
            В конкурсе могут принять участие специалисты-ботаники, экологи,
            преподаватели, студенты, фотографы, любители природы и все
            остальные желающие.
          text_2: "Для участия необходимо:"
          items:
            - зарегистрироваться на платформе uzflora.uz;
            - выразить желание участвовать в конкурсе;
            - размещать на платформе наблюдения растений согласно установленным требованиям.
          text_3: Каждый участник участвует только через один личный профиль.
        section_4:
          title: Требования к наблюдениям
          text_1: "Каждое наблюдение должно содержать следующую информацию:"
          items:
            - чёткую и качественную фотографию растения;
            - дату наблюдения;
            - географические координаты места наблюдения;
            - название области, района или региона;
            - по возможности — научное название растения;
            - краткую информацию о местообитании или среде произрастания.
          text_2: >-
            Для определения вида рекомендуется размещать несколько фотографий,
            показывающих как общий вид растения, так и лист, цветок, плод
            или другие диагностические признаки.
        section_5:
          title: Наблюдения, учитываемые в конкурсе
          text_1: "В результаты конкурса включаются наблюдения, соответствующие следующим требованиям:"
          items:
            - фотография сделана самим участником;
            - растение наблюдалось в природной или натурализованной среде;
            - дата и данные о местоположении указаны верно;
            - имеются качественные фотографии, позволяющие проверить наблюдение;
            - один и тот же вид не размещён многократно из одного и того же региона;
            - наблюдение подтверждено модератором или экспертами.
          text_2: >-
            Декоративные растения, высаженные в садах, теплицах, цветниках и
            во дворах, не включаются в основные результаты, если для них
            отдельно не объявлена номинация.
        section_6:
          title: Критерии оценки
          criteria:
            - title: Участник, наблюдавший наибольшее число видов
              text: "— определяется участник, достоверно зафиксировавший наибольшее число различных видов растений за время конкурса. Повторные наблюдения одного вида засчитываются в этой номинации один раз."
            - title: Наибольшее число качественных наблюдений
              text: "— награждается участник, разместивший наибольшее число полных, с точными координатами, качественными фотографиями и подтверждённых экспертами наблюдений."
            - title: Наиболее важная флористическая находка
              text: "— экспертная комиссия оценивает наблюдения, найденные в ранее слабо изученном регионе, расширяющие границы распространения вида или имеющие научное значение."
            - title: Лучшая фотография растения
              text: "— учитывается качество фотографии, естественность, композиция и степень отражения важных признаков растения."
            - title: Самый активный молодой натуралист
              text: "— среди студентов, школьников и молодых исследователей определяется автор самых активных и качественных наблюдений."
            - title: Участник, изучивший наибольшее число регионов
              text: "— награждается участник, представивший качественные наблюдения из наибольшего числа районов, географических регионов или местообитаний."
        section_7:
          title: Система начисления баллов
          text_1: "Для формирования общего рейтинга может использоваться следующая примерная система баллов:"
          items:
            - каждый новый подтверждённый вид — 10 баллов;
            - "редкое, эндемичное или научно значимое подтверждённое наблюдение — дополнительно 5–20 баллов по решению экспертов;"
            - неверное, повторное или непроверяемое наблюдение — не учитывается.
          text_2: >-
            Координаты редких растений могут не показываться публично
            полностью в случаях, когда существует риск их незаконного сбора.
        section_8:
          title: Бережное отношение к природе
          text_1: "Участники конкурса обязаны соблюдать следующие правила:"
          items:
            - не срывать растения и не выкапывать их с корнем;
            - не наносить вред редким и охраняемым видам;
            - не собирать без разрешения семена, луковицы или корневища;
            - не повреждать транспортными средствами естественный растительный покров;
            - соблюдать внутренние правила охраняемых территорий;
            - не вытаптывать местообитание ради одной фотографии;
            - не оставлять мусор во время наблюдения.
          motto: >-
            Основной принцип конкурса: «Наблюдайте, фотографируйте,
            фиксируйте данные, но не наносите вред природе».
        section_9:
          title: Запрещённые действия
          text_1: "Если будут выявлены следующие случаи, наблюдения могут быть аннулированы, а участник — отстранён от конкурса:"
          items:
            - использование чужой фотографии;
            - размещение старой фотографии в качестве нового наблюдения;
            - намеренное указание неверной даты или координат;
            - многократное повторное размещение одного и того же наблюдения;
            - "представление изображений, созданных с помощью искусственного интеллекта или с изменёнными признаками растения, в качестве реального наблюдения;"
            - намеренное причинение вреда растениям или их среде обитания;
            - присвоение данных других участников.
          text_2: >-
            В фотографию допускается вносить только базовую коррекцию света,
            контраста, цветового баланса и кадрирования. Редактирование,
            изменяющее естественные признаки растения, не допускается.
        section_10:
          title: Подтверждение результатов
          text: >-
            Все наблюдения проверяются модераторами uzflora.uz и
            приглашёнными специалистами-ботаниками. В спорных случаях
            эксперты могут запросить дополнительные фотографии, оригинальный
            файл фотографии, информацию о месте наблюдения или важные
            диагностические признаки растения. Итоговое решение экспертной
            комиссии является основным при определении результатов конкурса.
        section_11:
          title: Награждение победителей
          text_1: >-
            Победители по каждой номинации награждаются дипломом, памятными
            подарками и другими призами, определёнными организаторами.
          text_2: "Основные призы:"
          prizes:
            place: Место
            prize: Приз
            rows:
              - place: 1-е место
                prize: "Денежный приз 1 000 000 сум и одна книга"
              - place: 2-е место
                prize: "Денежный приз 500 000 сум и одна книга"
              - place: 3-е место
                prize: "Денежный приз 200 000 сум и одна книга"
              - place: Специальные номинации
                prize: Одна книга
          text_3: >-
            Победители будут объявлены 15.01.2027 на сайте uzflora.uz и в
            официальных социальных сетях проекта.
        section_12:
          title: Авторские права
          text: >-
            Авторские права на размещённые фотографии сохраняются за их
            авторами. Размещая фотографию на конкурс, участник предоставляет
            платформе uzflora.uz право использовать эти материалы в научных,
            просветительских и некоммерческих целях с указанием имени автора.
        section_13:
          title: Заключительные положения
          text: >-
            Участие в конкурсе означает согласие с данными условиями.
            Организаторы оставляют за собой право вносить уточнения в
            правила конкурса при необходимости. Все изменения публикуются на
            сайте uzflora.uz и в официальных информационных каналах.
        contacts_title: Контакты
