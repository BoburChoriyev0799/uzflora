ru:
  big_years:
    index:
      title: Большой Год
    prises:
      title: Большой год 2020
      text_1: >-
        Мы рады сообщить, что и в этом году на нашем сайте будут конкурсы с
        нужными для поля призами.
      text_2: Победителю «Большого года»  достанется палатка.
      text_3: 'За второе место: спальный мешок.'
      text_4: 'За третье место: туристический  коврик (каремат).'
      text_5: Приз за дебют года — справочник-определитель “Birds of Central Asia”
      text_6: Приз за самую интересную встречу году — набор походной посуды.
      text_7: >-
        Отдельная номинация от <a href="https://cadi.uni-greifswald.de/ru/start-2/">Инициативы по пустыням Центральной Азии</a> — «Лучшая фотография птиц пустыни».
      text_8: >-
        Но это ещё не всё! Вас ждут ещё больше интересных конкурсов и полезных
        призов! Следите за анонсами и начинайте свой личный Большой год!
      good_luck: Удачной фотоохоты!
      rules: 'О правилах соревнования вы можете узнать тут:'
      big_year: Соревнование «Большой год»
